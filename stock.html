<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>보수적 투자자를 위한 실시간 수급 타이머</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f4f7f6; color: #333; margin: 0; padding: 20px; }
        .header { text-align: center; margin-bottom: 30px; }
        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .card { background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .stock-name { font-size: 1.2em; font-weight: bold; margin-bottom: 10px; border-bottom: 2px solid #eee; padding-bottom: 5px;}
        .price-info { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .foreigner-buy { color: #d32f2f; font-weight: bold; } /* 빨간색: 매수 우위 */
        .foreigner-sell { color: #1976d2; font-weight: bold; } /* 파란색: 매도 우위 */
        .signal-buy { background-color: #ffebee; color: #c62828; padding: 10px; text-align: center; border-radius: 5px; font-weight: bold; }
        .signal-sell { background-color: #e3f2fd; color: #1565c0; padding: 10px; text-align: center; border-radius: 5px; font-weight: bold; }
        .signal-hold { background-color: #f5f5f5; color: #616161; padding: 10px; text-align: center; border-radius: 5px; font-weight: bold; }
        .settings { background: #e0f7fa; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="header">
        <h2>📊 대형주 중심 수급 추종 매매 대시보드</h2>
        <p>목표: 합리적 수익 추구 및 외국인 동조화 전략</p>
    </div>

    <div class="settings">
        <strong>⚙️ 나의 투자 원칙 설정:</strong> 
        목표 수익률 <input type="number" id="targetYield" value="5" style="width: 50px;"> % | 
        외국인 순매수 기준 <input type="number" id="foreignerVol" value="50000" style="width: 80px;"> 주 이상 시 '매수 검토'
    </div>

    <div class="dashboard" id="stockContainer">
        </div>

    <script>
        // 관심 종목 및 가상의 실시간 데이터 (향후 API 연동 필요)
        const stocks = [
            { name: "삼성전자", currentPrice: 75000, avgPrice: 72000, foreignerNet: 120000 },
            { name: "SK하이닉스", currentPrice: 160000, avgPrice: 165000, foreignerNet: -30000 },
            { name: "현대자동차", currentPrice: 240000, avgPrice: 220000, foreignerNet: 60000 },
            { name: "LG전자", currentPrice: 95000, avgPrice: 95000, foreignerNet: 15000 },
            { name: "LG에너지솔루션", currentPrice: 380000, avgPrice: 0, foreignerNet: 80000 }, // 미보유 상태 가정
            { name: "LG화학", currentPrice: 420000, avgPrice: 400000, foreignerNet: 45000 }
        ];

        function renderDashboard() {
            const container = document.getElementById('stockContainer');
            const targetYield = parseFloat(document.getElementById('targetYield').value);
            const foreignerVol = parseFloat(document.getElementById('foreignerVol').value);
            container.innerHTML = '';

            stocks.forEach(stock => {
                let currentYield = stock.avgPrice > 0 ? ((stock.currentPrice - stock.avgPrice) / stock.avgPrice * 100).toFixed(2) : 0;
                let signalHtml = '';
                let foreignerClass = stock.foreignerNet > 0 ? 'foreigner-buy' : 'foreigner-sell';
                
                // 의사결정 로직 구현 (무릎에 사서 어깨에 판다)
                if (stock.avgPrice > 0 && currentYield >= targetYield) {
                    signalHtml = `<div class="signal-sell">🔥 목표수익 달성! 즉시 매도 (어깨)</div>`;
                } else if (stock.avgPrice === 0 && stock.foreignerNet >= foreignerVol) {
                    signalHtml = `<div class="signal-buy">💡 외국인 수급 포착! 매수 진입 (무릎)</div>`;
                } else {
                    signalHtml = `<div class="signal-hold">⏳ 관망 (Hold)</div>`;
                }

                const card = `
                    <div class="card">
                        <div class="stock-name">${stock.name}</div>
                        <div class="price-info">
                            <span>현재가: ${stock.currentPrice.toLocaleString()}원</span>
                            <span>매수단가: ${stock.avgPrice > 0 ? stock.avgPrice.toLocaleString() + '원' : '미보유'}</span>
                        </div>
                        <div class="price-info">
                            <span>현재 수익률: <strong>${stock.avgPrice > 0 ? currentYield + '%' : '-'}</strong></span>
                            <span class="${foreignerClass}">외국인: ${stock.foreignerNet > 0 ? '+' : ''}${stock.foreignerNet.toLocaleString()}주</span>
                        </div>
                        ${signalHtml}
                    </div>
                `;
                container.innerHTML += card;
            });
        }

        // 초기 렌더링 및 설정 변경 시 업데이트
        renderDashboard();
        document.getElementById('targetYield').addEventListener('change', renderDashboard);
        document.getElementById('foreignerVol').addEventListener('change', renderDashboard);
    </script>
</body>
</html>
